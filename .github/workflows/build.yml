name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Unshrill.slnx

      - name: Build
        run: dotnet build Unshrill.slnx --configuration Release --no-restore

      - name: Run smoke tests
        run: dotnet run --project tests/Unshrill.Tests --configuration Release --no-build

